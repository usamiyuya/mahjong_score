<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>麻雀成績管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Firebase 初期化 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCb1zWZvsfP3ovG1l48hq5_3t4uPFDiH3Q",
      authDomain: "mahjong-score-a0d70.firebaseapp.com",
      projectId: "mahjong-score-a0d70",
      storageBucket: "mahjong-score-a0d70.appspot.com",
      messagingSenderId: "737019062372",
      appId: "1:737019062372:web:7942006e29fd7b31ad9771"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);

    // Firebase 初期化が成功したら app.js を読み込む
    const script = document.createElement("script");
    script.type = "module";
    script.src = "app.js";
    document.body.appendChild(script);
  </script>

  <!-- UI本体 -->
  <section id="tab-input" class="tab-page active">
    <h2>対局入力</h2>

    <div class="card">
      <label>日付</label>
      <input type="date" id="game-date">

      <label>ルール</label>
      <select id="game-rule">
        <option value="半荘">半荘</option>
        <option value="東風">東風</option>
      </select>

      <h3>集計ルール</h3>

      <div class="card">

      <label>プリセットルール</label>
      <select id="rule-select"></select>

      <button id="save-rule-btn" type="button">
      現在の設定をルールとして保存
      </button>

      <hr>

      <label>返し点</label>
      <select id="return-point">
        <option value="25000">25000</option>
        <option value="30000" selected>30000</option>
        <option value="35000">35000</option>
        <option value="40000">40000</option>
      </select>

      <label>端数処理</label>
      <select id="rounding-rule">
        <option value="mahjong">
          麻雀式
        </option>
        <option value="gosha">
          五捨六入
        </option>
        <option value="shisha">
          四捨五入
        </option>
        <option value="ceil">
          切り上げ
        </option>
        <option value="floor">
          切り捨て
        </option>
      </select>

      </div>

      <label>ウマ（例：10-30）</label>
      <input type="text" id="game-uma" placeholder="10-30" value="10-30">

      <label>オカ（例：0）</label>
      <input type="number" id="game-oka" placeholder="0" value="0">
      
      <label>返し点</label>
      <select id="game-return">
        <option value="30000" selected>30000点返し</option>
        <option value="25000">25000点返し</option>
        <option value="35000">35000点返し</option>
        <option value="40000">40000点返し</option>
      </select>

      <label>端数処理</label>
      <select id="rounding-rule">
        <option value="mahjong" selected>
          麻雀式（返し点以上切捨て・未満切上げ）
        </option>
        <option value="gosha">五捨六入</option>
        <option value="shisha">四捨五入</option>
        <option value="ceil">切り上げ</option>
        <option value="floor">切り捨て</option>
      </select>

    </div>

    <h3>プレイヤー入力</h3>

    <div id="players-input">
      <div class="player-card">
        <input list="player-list" type="text" class="player-name" placeholder="プレイヤー名">
        <input type="number" class="player-score" placeholder="素点">
        <input type="number" class="player-rank" placeholder="順位">
      </div>
      <div class="player-card">
        <input list="player-list" type="text" class="player-name" placeholder="プレイヤー名">
        <input type="number" class="player-score" placeholder="素点">
        <input type="number" class="player-rank" placeholder="順位">
      </div>
      <div class="player-card">
        <input list="player-list" type="text" class="player-name" placeholder="プレイヤー名">
        <input type="number" class="player-score" placeholder="素点">
        <input type="number" class="player-rank" placeholder="順位">
      </div>
      <div class="player-card">
        <input list="player-list" type="text" class="player-name" placeholder="プレイヤー名">
        <input type="number" class="player-score" placeholder="素点">
        <input type="number" class="player-rank" placeholder="順位">
      </div>
    </div>

    <datalist id="player-list"></datalist>

    <div class="card">
      <label>メモ</label>
      <input type="text" id="game-note" placeholder="ウマ・オカなど">
    </div>

    <button id="add-record-btn" class="primary-btn">成績を追加</button>

    <h3>最近の成績</h3>
    <div id="record-list"></div>
  </section>

  <section id="tab-daily" class="tab-page">
    <h2>日別集計</h2>
    <input type="date" id="daily-date">
    <button id="show-daily-btn" class="primary-btn">表示</button>
    <div id="daily-list"></div>
  </section>

  <section id="tab-players" class="tab-page">
    <h2>プレイヤー別成績</h2>
    <div id="players-list"></div>
  </section>

  <nav class="bottom-nav">
    <button data-target="tab-input" class="active">入力</button>
    <button data-target="tab-daily">日別</button>
    <button data-target="tab-players">プレイヤー</button>
  </nav>

</body>
</html>
