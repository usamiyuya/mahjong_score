<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>麻雀成績管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 画面：対局入力 -->
  <section id="tab-input" class="tab-page active">
    <h2>対局入力</h2>

    <div class="card">
      <label>日付</label>
      <input type="date" id="game-date">

      <label>ルール</label>
      <select id="game-rule">
        <option value="半荘">半荘</option>
        <option value="東風">東風</option>
      </select>
    </div>

    <h3>プレイヤー入力</h3>

    <div id="players-input">
      <!-- 4人分の入力欄 -->
      <div class="player-card">
        <input list="player-list" type="text" placeholder="プレイヤー名" class="player-name">
        <input type="number" placeholder="スコア" class="player-score">
        <input type="number" placeholder="順位" class="player-rank">
      </div>

      <div class="player-card">
        <input list="player-list" type="text" placeholder="プレイヤー名" class="player-name">
        <input type="number" placeholder="スコア" class="player-score">
        <input type="number" placeholder="順位" class="player-rank">
      </div>

      <div class="player-card">
        <input list="player-list" type="text" placeholder="プレイヤー名" class="player-name">
        <input type="number" placeholder="スコア" class="player-score">
        <input type="number" placeholder="順位" class="player-rank">
      </div>

      <div class="player-card">
        <input list="player-list" type="text" placeholder="プレイヤー名" class="player-name">
        <input type="number" placeholder="スコア" class="player-score">
        <input type="number" placeholder="順位" class="player-rank">
      </div>
    </div>

    <!-- 過去プレイヤー名の候補 -->
    <datalist id="player-list"></datalist>

    <div class="card">
      <label>メモ</label>
      <input type="text" id="game-note" placeholder="ウマ・オカなど">
    </div>

    <button id="add-record-btn" class="primary-btn">成績を追加</button>

    <h3>最近の成績</h3>
    <div id="record-list"></div>
  </section>

  <!-- 画面：日別集計 -->
  <section id="tab-daily" class="tab-page">
    <h2>日別集計</h2>
    <input type="date" id="daily-date">
    <button id="show-daily-btn" class="primary-btn">表示</button>
    <div id="daily-list"></div>
  </section>

  <!-- 画面：プレイヤー別 -->
  <section id="tab-players" class="tab-page">
    <h2>プレイヤー別成績</h2>
    <div id="players-list"></div>
  </section>

  <!-- 下タブ -->
  <nav class="bottom-nav">
    <button data-target="tab-input" class="active">入力</button>
    <button data-target="tab-daily">日別</button>
    <button data-target="tab-players">プレイヤー</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
